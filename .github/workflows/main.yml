name: Fabricar APK
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fabricar con Buildozer
        uses: kivy/buildozer-action@v1.2.4
        with:
          buildozer_version: stable
      - name: Subir APK Final
        uses: actions/upload-artifact@v4
        with:
          name: CapoPlay-APK
          path: bin/*.apk
