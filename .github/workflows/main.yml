name: Build
on: [push, workflow_dispatch]
jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fabricar
        uses: ArtemShatalov/buildozer-action@v1.6.1
        with:
          buildozer_version: stable
      - uses: actions/upload-artifact@v4
        with:
          name: CapoPlay-APK
          path: bin/*.apk
