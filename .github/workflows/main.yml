name: Fabricar APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fabricar con Buildozer
        uses: ArtemShatalov/buildozer-action@v1.6.1
        with:
          workdir: .
          buildozer_version: stable

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: CapoPlay-APK
          path: bin/*.apk
