name: Build
on: [push, workflow_dispatch]
jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fabricar APK
        uses: kivy/buildozer-action@master
        with:
          buildozer_version: stable
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: CapoPlay-APK
          path: bin/*.apk
